# Secrets config for the playground-wasm-acp host.
#
# Pass to the host via `--secrets <path>`. Lookups are scoped by
# component id: each stage in the chain can only read keys that are
# explicitly granted to its component id (deny-by-default).
#
# Component id = the wasm filename's stem with non-alphanumerics
# normalized (e.g. `ollama_provider.wasm` -> `ollama_provider`,
# `uppercase_layer.wasm` -> `uppercase_layer`).
#
# Each entry is either an inline `value` (plaintext) OR a `command`
# whose stdout is captured at first read and cached for the host's
# process lifetime. Setting both, or neither, is rejected at startup.
#
# Resolved values never appear in host logs.

# ─── Inline plaintext ────────────────────────────────────────────────
[ollama_provider]
# A plain UTF-8 string secret.
api_key = { value = "sk-replace-me" }

# Binary secret. `value` is base64-encoded; `bytes = true` materializes
# it as `secret-value::bytes` on the guest side.
signing_key = { value = "aGVsbG8td29ybGQ=", bytes = true }


# ─── External command (e.g. 1Password CLI) ───────────────────────────
[uppercase_layer]
# stdout becomes the secret value (trailing newline stripped). Non-zero
# exit -> `secrets-error::upstream`. Spawn/timeout failures -> `io`.
github_token = { command = ["op", "read", "op://Personal/GitHub/token"] }

# Optional per-entry timeout in milliseconds (default: 5000).
slow_secret = { command = [
    "sh",
    "-c",
    "sleep 1 && echo hunter2",
], timeout-ms = 3000 }
